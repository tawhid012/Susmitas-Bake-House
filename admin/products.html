<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Product Management | Susmita's Bake House Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
    <div class="admin-wrapper">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="sidebar-header">Bake House Admin
                <button class="mobile-close-sidebar" onclick="toggleSidebar()"><i class="fas fa-times"></i></button>
            </div>
            <nav class="sidebar-nav">
                <a href="index.html" class="sidebar-link"><i class="fas fa-home"></i> Dashboard</a>
                <a href="orders.html" class="sidebar-link"><i class="fas fa-shopping-cart"></i> Orders</a>
                <a href="products.html" class="sidebar-link active"><i class="fas fa-cake-candles"></i> Products</a>
                <a href="homepage.html" class="sidebar-link"><i class="fas fa-globe"></i> Homepage CMS</a>
                <a href="#" class="sidebar-link" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="admin-main">
            <header class="admin-header">
                <div class="admin-header-left">
                    <button class="mobile-menu-btn" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
                    <h2>Product Management</h2>
                </div>
                <button class="btn-admin" onclick="openProductModal()"><i class="fas fa-plus"></i> Add Product</button>
            </header>

            <div class="admin-content">
                <div class="table-responsive">
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="products-list">
                        <tr><td colspan="6">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
            </div>
        </main>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:100; align-items:center; justify-content:center;">
        <div style="background:white; padding:30px; border-radius:8px; width:600px; max-width:90%; max-height:90vh; overflow-y:auto;">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
                <h3 id="modal-title">Add / Edit Product</h3>
                <button onclick="closeProductModal()" style="background:none; border:none; font-size:20px; cursor:pointer;">&times;</button>
            </div>
            
            <form id="product-form">
                <input type="hidden" id="p_id">
                <div class="form-group">
                    <label>Product Name</label>
                    <input type="text" id="p_name" class="form-control" required oninput="document.getElementById('p_slug').value = this.value.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');">
                </div>
                <div class="form-group">
                    <label>Slug (URL)</label>
                    <input type="text" id="p_slug" class="form-control" required>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                    <div class="form-group">
                        <label>Base Price (₹)</label>
                        <input type="number" id="p_price" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="p_category" class="form-control" style="margin-bottom: 5px;"></select>
                        <a href="#" onclick="toggleNewCategory(event)" style="font-size: 12px; color: var(--admin-primary); text-decoration: none;">+ Add New Category</a>
                        <div id="new-category-wrapper" style="display: none; margin-top: 10px; gap: 5px;">
                            <input type="text" id="new_category_name" class="form-control" placeholder="Category Name" style="padding: 6px 10px; font-size: 12px;">
                            <button type="button" class="btn-admin" style="padding: 6px 12px; font-size: 12px;" onclick="addNewCategory()">Save</button>
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Short Description</label>
                    <input type="text" id="p_short_desc" class="form-control">
                </div>
                <div class="form-group">
                    <label>Product Image</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="file" id="p_image_file" class="form-control" accept="image/*">
                        <span id="upload-progress" style="font-size:12px; font-weight:bold; color:#8B5CF6; display:none;">Uploading...</span>
                    </div>
                    <small style="color: #6B7280; display: block; margin: 5px 0;">(Select a file to upload OR paste a URL below. Leave empty to keep existing.)</small>
                    <input type="text" id="p_image" class="form-control" placeholder="Or paste image URL...">
                </div>
                <div style="display:flex; gap:20px; margin-bottom:20px;">
                    <label><input type="checkbox" id="p_bestseller"> Bestseller</label>
                    <label><input type="checkbox" id="p_featured"> Featured</label>
                    <label><input type="checkbox" id="p_active" checked> Active</label>
                </div>
                <button type="submit" class="btn-admin" style="width:100%;">Save Product</button>
            </form>
        </div>
    </div>

    <script src="../js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let allCategories = [];

        async function loadProducts() {
            // Load categories for dropdown
            const { data: cats } = await supabaseClient.from('categories').select('*');
            allCategories = cats || [];
            const catSelect = document.getElementById('p_category');
            catSelect.innerHTML = '<option value="">Select Category</option>';
            allCategories.forEach(c => {
                catSelect.innerHTML += `<option value="${c.id}">${c.name}</option>`;
            });

            // Load products
            const { data: prods } = await supabaseClient.from('products').select('*').order('created_at', { ascending: false });
            const tbody = document.getElementById('products-list');
            tbody.innerHTML = '';

            if(!prods || prods.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6">No products found.</td></tr>';
                return;
            }

            prods.forEach(p => {
                const cat = allCategories.find(c => c.id === p.category_id);
                const catName = cat ? cat.name : 'Uncategorized';
                const imgSrc = p.image_url ? (p.image_url.startsWith('http') ? p.image_url : '../' + p.image_url) : '../hero_cake_1780105814884.png';
                
                tbody.innerHTML += `
                    <tr>
                        <td><img src="${imgSrc}" width="50" height="50" style="border-radius:4px; object-fit:cover;"></td>
                        <td><strong>${p.name}</strong><br><small style="color:#6B7280">${p.slug}</small></td>
                        <td>${catName}</td>
                        <td>₹${p.base_price}</td>
                        <td>${p.active ? '<span style="color:green">Active</span>' : '<span style="color:red">Inactive</span>'}</td>
                        <td>
                            <button class="btn-admin" style="padding: 4px 8px; font-size:12px; margin-right:5px;" onclick='editProduct(${JSON.stringify(p).replace(/'/g, "&apos;")})'>Edit</button>
                            <button class="btn-admin btn-danger" style="padding: 4px 8px; font-size:12px;" onclick="deleteProduct('${p.id}')">Delete</button>
                        </td>
                    </tr>
                `;
            });
        }

        function toggleNewCategory(e) {
            e.preventDefault();
            const wrapper = document.getElementById('new-category-wrapper');
            wrapper.style.display = wrapper.style.display === 'none' ? 'flex' : 'none';
        }

        async function addNewCategory() {
            const nameInput = document.getElementById('new_category_name');
            const name = nameInput.value.trim();
            if(!name) return;

            const slug = name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
            
            const btn = document.querySelector('#new-category-wrapper button');
            const originalText = btn.textContent;
            btn.textContent = '...';
            btn.disabled = true;

            const { data, error } = await supabaseClient.from('categories').insert([{ 
                name: name, 
                slug: slug, 
                active: true 
            }]).select().single();

            btn.textContent = originalText;
            btn.disabled = false;

            if (error) {
                alert('Error adding category: ' + error.message);
                return;
            }

            // Update local array
            allCategories.push(data);
            
            // Add to dropdown and select it
            const catSelect = document.getElementById('p_category');
            catSelect.innerHTML += `<option value="${data.id}">${data.name}</option>`;
            catSelect.value = data.id;

            // Reset and hide
            nameInput.value = '';
            document.getElementById('new-category-wrapper').style.display = 'none';
        }

        function openProductModal() {
            document.getElementById('product-form').reset();
            document.getElementById('p_id').value = '';
            document.getElementById('p_image_file').value = '';
            document.getElementById('upload-progress').style.display = 'none';
            document.getElementById('modal-title').textContent = 'Add Product';
            document.getElementById('product-modal').style.display = 'flex';
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        function editProduct(p) {
            document.getElementById('modal-title').textContent = 'Edit Product';
            document.getElementById('p_id').value = p.id;
            document.getElementById('p_name').value = p.name;
            document.getElementById('p_slug').value = p.slug;
            document.getElementById('p_price').value = p.base_price;
            document.getElementById('p_category').value = p.category_id || '';
            document.getElementById('p_short_desc').value = p.short_description || '';
            document.getElementById('p_image').value = p.image_url || '';
            document.getElementById('p_image_file').value = '';
            document.getElementById('upload-progress').style.display = 'none';
            document.getElementById('p_bestseller').checked = p.bestseller;
            document.getElementById('p_featured').checked = p.featured;
            document.getElementById('p_active').checked = p.active;
            
            document.getElementById('product-modal').style.display = 'flex';
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = document.getElementById('p_id').value;
            const submitBtn = e.target.querySelector('button[type="submit"]');
            
            let imageUrl = document.getElementById('p_image').value;
            const fileInput = document.getElementById('p_image_file');
            const progressSpan = document.getElementById('upload-progress');
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Saving...';

            if (fileInput.files.length > 0) {
                const file = fileInput.files[0];
                progressSpan.style.display = 'inline-block';
                progressSpan.textContent = 'Uploading...';
                
                const fileExt = file.name.split('.').pop();
                const fileName = 'product_' + Math.random().toString(36).substring(2, 15) + '_' + Date.now() + '.' + fileExt;
                
                const { data, error } = await supabaseClient.storage
                    .from('media')
                    .upload(fileName, file, { cacheControl: '3600', upsert: false });
                    
                if (error) {
                    alert('Image upload failed: ' + error.message);
                    progressSpan.style.display = 'none';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Save Product';
                    return;
                }
                
                const { data: publicUrlData } = supabaseClient.storage.from('media').getPublicUrl(fileName);
                imageUrl = publicUrlData.publicUrl;
                progressSpan.textContent = 'Uploaded!';
                document.getElementById('p_image').value = imageUrl;
            }
            
            const payload = {
                name: document.getElementById('p_name').value,
                slug: document.getElementById('p_slug').value,
                base_price: document.getElementById('p_price').value,
                category_id: document.getElementById('p_category').value || null,
                short_description: document.getElementById('p_short_desc').value,
                image_url: imageUrl,
                bestseller: document.getElementById('p_bestseller').checked,
                featured: document.getElementById('p_featured').checked,
                active: document.getElementById('p_active').checked
            };

            if (id) {
                // Update
                const { error } = await supabaseClient.from('products').update(payload).eq('id', id);
                if(error) alert(error.message);
                else { closeProductModal(); loadProducts(); }
            } else {
                // Insert
                const { error } = await supabaseClient.from('products').insert([payload]);
                if(error) alert(error.message);
                else { closeProductModal(); loadProducts(); }
            }
            
            submitBtn.disabled = false;
            submitBtn.textContent = 'Save Product';
        });

        async function deleteProduct(id) {
            if(confirm("Are you sure you want to delete this product?")) {
                await supabaseClient.from('products').delete().eq('id', id);
                loadProducts();
            }
        }

        document.addEventListener('DOMContentLoaded', loadProducts);
    </script>
    <script>
        function toggleSidebar() {
            document.querySelector('.admin-sidebar').classList.toggle('open');
            const overlay = document.getElementById('sidebarOverlay');
            if(overlay) overlay.classList.toggle('active');
        }
    </script>
</body>
</html>
